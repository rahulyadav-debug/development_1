  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

gin:0;color:var(--ink)}\na{color:var(--wine);text-decoration:none}\na:hover{color:var(--wine-dark)}\n.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:8px;font-weight:600;font-size:15px;padding:13px 26px;cursor:pointer;border:none;white-space:nowrap}\n.btn-primary{background:var(--wine);color:#fff}\n.btn-primary:hover{background:var(--wine-dark);color:#fff}\n.btn-block{width:100%}\n.header{position:sticky;top:0;z-index:40;background:#fff;border-bottom:1px solid var(--line)}\n.header-inner{display:flex;align-items:center;justify-content:space-between;gap:24px;padding:14px 24px;max-width:1180px;margin:0 auto}\n.logo{display:flex;flex-direction:column;line-height:1.1}\n.logo .word{font-family:'Lora',serif;font-weight:700;font-size:24px;color:var(--wine)}\n.logo .tag{font-size:11px;letter-spacing:.04em;color:var(--ink-soft);text-transform:uppercase}\n.navlinks{display:flex;align-items:center;gap:26px;list-style:none;margin:0;padding:0}\n.navlinks a{color:var(--ink);font-weight:500;font-size:15px}\n.navlinks a:hover{color:var(--wine)}\n.header-cta{display:flex;align-items:center;gap:14px}\n.icon-btn{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:50%;border:1.5px solid var(--line);color:var(--wine);flex-shrink:0}\n.hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px}\n.mobile-nav{display:none;flex-direction:column;gap:2px;background:#fff;border-bottom:1px solid var(--line);padding:8px 24px 16px}\n.mobile-nav.open{display:flex}\n.mobile-nav a{padding:10px 0;color:var(--ink);font-weight:500;border-bottom:1px solid var(--line)}\n.crumbbar{background:var(--wine-light);padding:12px 0;font-size:13px;color:var(--ink-soft)}\n.crumbbar a{color:var(--ink-soft)}\n.crumbbar a:hover{color:var(--wine)}\n.crumb-sep{margin:0 6px;opacity:.6}\n.tabbar{display:flex;gap:32px;border-bottom:1px solid var(--line);padding:0 24px;max-width:1180px;margin:0 auto}\n.tab{padding:16px 2px;font-weight:600;font-size:15px;color:var(--ink-soft);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer}\n.tab.active{color:var(--wine);border-bottom-color:var(--wine)}\n.wrap{max-width:1180px;margin:0 auto;padding:0 24px}\n.hero{padding:40px 0 8px}\n.hero-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:40px;align-items:start}\n.eyebrow{font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--wine);margin-bottom:10px}\n.h1{font-size:38px;font-weight:600;line-height:1.15}\n.h1 em{font-style:italic;color:var(--wine)}\n.subtitle{margin-top:10px;color:var(--ink-soft);font-size:16px;max-width:620px}\n.price-row{display:flex;align-items:baseline;gap:10px;margin-top:22px}\n.price-label{font-size:15px;color:var(--ink-soft)}\n.price-amount{font-size:32px;font-weight:700;font-family:'Lora',serif;color:var(--wine)}\n.factlist{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:28px;padding:22px 0;border-top:1px solid var(--line)}\n.fact-label{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em}\n.fact-value{font-size:15px;font-weight:600;margin-top:4px}\n.formcard{position:sticky;top:96px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px;box-shadow:0 12px 32px -16px rgba(43,35,32,.18)}\n.formcard h3{font-size:18px}\n.formcard .sub{color:var(--ink-soft);font-size:13px;margin-top:4px}\n.field{margin-top:12px}\n.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:4px}\n.field input{width:100%;padding:10px 14px;border:1.5px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;background:#fff}\n.field input:focus{outline:none;border-color:var(--wine)}\n.phone-input{display:flex;gap:8px}\n.phone-input .code{width:64px;flex-shrink:0;text-align:center}\n.err{color:#B23434;font-size:12px;margin-top:5px}\n.formcard .btn{margin-top:14px}\n.formnote{display:flex;align-items:center;gap:6px; " sc-camel-on-click=\"{{showCost}}\">Cost<\/button><\/div><main><section class=\"hero wrap\"><div class=\"hero-grid\"><div><div class=\"eyebrow\">EGG FREEZING · DELHI<\/div><h1 class=\"h1\">Egg Freezing Cost <em>in Delhi<\/em><\/h1><p class=\"subtitle\">Transparent, upfront pricing for oocyte cryopreservation at Ferticity IVF &amp; Fertility Clinics with no hidden charges and a dedicated fertility counselor beside you at every step.<\/p><div class=\"price-row\"><span class=\"price-label\">Starts from<\/span><span class=\"price-amount\">{{startingPriceDisplay}}<\/span><\/div><div class=\"factlist\"><div><div class=\"fact-label\">Procedure Type<\/div><div class=\"fact-value\">Non-surgical<\/div><\/div><div><div class=\"fact-label\">Other Name<\/div><div class=\"fact-value\">Oocyte Cryopreservation<\/div><\/div><div><div class=\"fact-label\">Cycle Duration<\/div><div class=\"fact-value\">10 – 14 days<\/div><\/div><div><div class=\"fact-label\">Hospital Stay<\/div><div class=\"fact-value\">Day-care, no admission<\/div><\/div><div><div class=\"fact-label\">Anesthesia<\/div><div class=\"fact-value\">Mild IV sedation<\/div><\/div><div><div class=\"fact-label\">Storage<\/div><div class=\"fact-value\">Billed separately, per year<\/div><\/div><\/div><\/div><div class=\"formcard\" id=\"lead-form\"><sc-if value=\"{{!submitted}}\" hint-placeholder-val=\"{{true}}\"><h3>Get Your Personal Cost Estimate<\/h3><div class=\"field\"><label>Patient Name<\/label><input type=\"text\" placeholder=\"Enter your full name\" value=\"{{name}}\" sc-camel-on-change=\"{{onNameChange}}\"><sc-if value=\"{{nameError}}\"><div class=\"err\">{{nameError}}<\/div><\/sc-if><\/div><div class=\"field\"><label>Mobile Number<\/label><input type=\"tel\" placeholder=\"10-digit mobile number\" value=\"{{phone}}\" sc-camel-on-change=\"{{onPhoneChange}}\"><sc-if value=\"{{phoneError}}\"><div class=\"err\">{{phoneError}}<\/div><\/sc-if><\/div><div class=\"field\"><label>City<\/label><input type=\"text\" placeholder=\"Enter your city\" value=\"{{city}}\" sc-camel-on-change=\"{{onCityChange}}\"><\/div><button class=\"btn btn-primary btn-block\" sc-camel-on-click=\"{{onSubmit}}\">Get Cost Estimate<\/button><div class=\"formnote\">💯 No booking fees · 100% confidential<\/div><\/sc-if><sc-if value=\"{{submitted}}\" hint-placeholder-val=\"{{false}}\"><div class=\"success\"><div class=\"tick\"><svg width=\"24\" height=\"24\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M5 13l4 4L19 7\" stroke=\"#fff\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\/path><\/svg><\/div><h3>Thank you, {{name}}!<\/h3><p class=\"sub\">Our fertility counselor will call you on +91 {{phone}} shortly with your personalized estimate.<\/p><\/div><\/sc-if><\/div><\/div><\/section><section class=\"stats-bar\"><div class=\"wrap stats-grid\"><div><div class=\"stat-num\">20+<\/div><div class=\"stat-label\">Years Combined Expertise<\/div><\/div><div><div class=\"stat-num\">17,800+<\/div><div class=\"stat-label\">Successful IVF &amp; ICSI Procedures<\/div><\/div><div><div class=\"stat-num\">58,000+<\/div><div class=\"stat-label\">Happy Patients<\/div><\/div><\/div><\/section><section class=\"sec\"><div class=\"wrap\"><div class=\"sec-head\"><div class=\"sec-eyebrow\">Is it right for you?<\/div><h2 class=\"sec-title\">When Should You Consider Egg Freezing?<\/h2><p class=\"sec-sub\">Fertility preservation is a personal decision. These are the most common reasons women choose to freeze their eggs.<\/p><\/div><div class=\"consider-grid\"><div class=\"consider-card\"><div class=\"consider-num\">01<\/div><div class=\"consider-text\">Delaying parenthood for career, education or personal readiness<\/div><\/div><div class=\"consider-card\"><div class=\"consider-num\">02<\/div><div class=\"consider-text\">Before chemotherapy, radiation or surgery that may affect fertility<\/div><\/div><div class=\"consider-card\"><div class=\"consider-num\">03<\/div><div class=\"consider-text\">Diagnosed with a condition affecting ovarian reserve, such as endometriosis or PCOS<\/div><\/div><div class=\"consider-card\"><div class=\"consider-num\">04<\/div><div class=\"consider-text\">Haven't found the right partner yet, but want to keep biological options open<\/div><\/div><div class=\"consider-card\"><div class=\"consider-num\">05<\/div><div class=\"consider-text\">Low AMH or declining ovarian reserve found during routine fertility testing<\/div><\/div><\/div><\/div><\/section><section class=\"sec sec-alt\"><div class=\"wrap\"><div class=\"sec-head\"><div class=\"sec-eyebrow\">Cost Breakdown<\/div><h2 class=\"sec-title\">What Goes Into Your Egg Freezing Cost<\/h2><p class=\"sec-sub\">Every estimate is broken down for you in advance — no surprises, no hidden add-ons.<\/p><\/div><sc-raw-table class=\"data-table\"><sc-raw-thead><sc-raw-tr><sc-raw-th>Component<\/sc-raw-th><sc-raw-th class=\"amt\">Approx. Cost<\/sc-raw-th><\/sc-raw-tr><\/sc-raw-thead><sc-raw-tbody><sc-raw-tr><sc-raw-td>Ovarian stimulation &amp; monitoring<\/sc-raw-td><sc-raw-td class=\"amt\">₹25,000 – ₹45,000<\/sc-raw-td><\/sc-raw-tr><sc-raw-tr><sc-raw-td>Egg retrieval procedure (day-care)<\/sc-raw-td><sc-raw-td class=\"amt\">₹35,000 – ₹50,000<\/sc-raw-td><\/sc-raw-tr><sc-raw-tr><sc-raw-td>Vitrification &amp; freezing<\/sc-raw-td><sc-raw-td class=\"amt\">₹20,000 – ₹30,000<\/sc-raw-td><\/sc-raw-tr><sc-raw-tr><sc-raw-td>Fertility medications<\/sc-raw-td><sc-raw-td class=\"amt\">₹40,000 – ₹80,000<\/sc-raw-td><\/sc-raw-tr><sc-raw-tr><sc-raw-td>Annual storage fee (from Year 2)<\/sc-raw-td><sc-raw-td class=\"amt\">₹15,000 – ₹25,000 / yr<\/sc-raw-td><\/sc-raw-tr><\/sc-raw-tbody><sc-raw-tfoot><sc-raw-tr><sc-raw-td>Total for Year 1 (procedure + medicines)<\/sc-raw-td><sc-raw-td class=\"amt\">₹90,000 – ₹1,80,000<\/sc-raw-td><\/sc-raw-tr><\/sc-raw-tfoot><\/sc-raw-table><p class=\"table-note\">*Actual cost depends on your age, ovarian reserve, medication protocol and number of eggs retrieved. Storage fees are billed separately from Year 2 onward.<\/p><\/div><\/section><section class=\"sec\"><div class=\"wrap\"><div class=\"sec-head\"><div class=\"sec-eyebrow\">Cost Factors<\/div><h2 class=\"sec-title\">What Affects Your Egg Freezing Cost<\/h2><\/div><div class=\"factors-list\"><div class=\"factor-item\"><div class=\"factor-num\">1<\/div><div class=\"factor-text\"><b>Age &amp; ovarian reserve<\/b>May determine how many stimulation cycles are needed to retrieve a healthy number of eggs.<\/div><\/div><div class=\"factor-item\"><div class=\"factor-num\">2<\/div><div class=\"factor-text\"><b>Fertility medication dosage<\/b>Higher doses or additional stimulation drugs increase the medicine cost.<\/div><\/div><div class=\"factor-item\"><div class=\"factor-num\">3<\/div><div class=\"factor-text\"><b>Number of eggs retrieved<\/b>More eggs may mean an additional stimulation cycle to reach your target count.<\/div><\/div><div class=\"factor-item\"><div class=\"factor-num\">4<\/div><div class=\"factor-text\"><b>Diagnostic work-up required<\/b>Hormonal and infection screening tests are priced separately from the procedure.<\/div><\/div><div class=\"factor-item\"><div class=\"factor-num\">5<\/div><div class=\"factor-text\"><b>Storage duration<\/b>1-year vs multi-year storage plans are billed at different annual rates.<\/div><\/div><div class=\"factor-item\"><div class=\"factor-num\">6<\/div><div class=\"factor-text\"><b>Anesthesia &amp; lab technique<\/b>Choice of sedation and any advanced vitrification add-ons can affect the final bill.<\/div><\/div><\/div><\/div><\/section><section class=\"sec sec-alt\"><div class=\"wrap\"><div class=\"sec-head\"><div class=\"sec-eyebrow\">Before You Begin<\/div><h2 class=\"sec-title\">Diagnostic Test Costs<\/h2><p class=\"sec-sub\">These tests help your fertility specialist plan the right stimulation protocol for you.<\/p><\/div><sc-raw-table class=\"data-table\"><sc-raw-thead><sc-raw-tr><sc-raw-th>Test<\/sc-raw-th><sc-raw-th class=\"amt\">Approx. Cost<\/sc-raw-th><\/sc-raw-tr><\/sc-raw-thead><sc-raw-tbody><sc-raw-tr><sc-raw-td>AMH (Anti-Müllerian Hormone) Test<\/sc-raw-td><sc-raw-td class=\"amt\">₹1,200 – ₹1,800<\/sc-raw-td><\/sc-raw-tr><sc-raw-tr><sc-raw-td>Transvaginal Ultrasound (Antral Follicle Count)<\/sc-raw-td><sc-raw-td class=\"amt\">₹1,500 – ₹2,500<\/sc-raw-td><\/sc-raw-tr><sc-raw-tr><sc-raw-td>Hormonal Profile (FSH, LH, E2, TSH, Prolactin)<\/sc-raw-td><sc-raw-td class=\"amt\">₹2,500 – ₹3,500<\/sc-raw-td><\/sc-raw-tr><sc-raw-tr><sc-raw-td>Infectious Disease Screening (HIV, HBsAg, HCV)<\/sc-raw-td><sc-raw-td class=\"amt\">₹2,500 – ₹4,000<\/sc-raw-td><\/sc-raw-tr><\/sc-raw-tbody><sc-raw-tfoot><sc-raw-tr><sc-raw-td>Total diagnostic work-up<\/sc-raw-td><sc-raw-td class=\"amt\">₹7,700 – ₹11,800<\/sc-raw-td><\/sc-raw-tr><\/sc-raw-tfoot><\/sc-raw-table><\/div><\/section><section class=\"sec\"><div class=\"wrap\"><div class=\"sec-head\"><div class=\"sec-eyebrow\">WHY US?<\/div><h2 class=\"sec-title\">Why Choose Pristyn Care Ferticity for Egg Freezing<\/h2><\/div><div class=\"why-grid\"><div class=\"why-card\"><div class=\"why-icon\"><svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M12 2l3 6 6 1-4.5 4.5L17.5 21 12 18l-5.5 3 1-7.5L3 9l6-1z\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"><\/path><\/svg><\/div><div class=\"why-text\">India's 1st stand-alone NABH-accredited IVF centre<\/div><\/div><div class=\"why-card\"><div class=\"why-icon\"><svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M9 3h6M10 3v5.5L4.5 18a2 2 0 0 0 1.8 3h11.4a2 2 0 0 0 1.8-3L14 8.5V3\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"><\/path><\/svg><\/div><div class=\"why-text\">State-of-the-art IVF lab &amp; embryology unit<\/div><\/div><div class=\"why-card\"><div class=\"why-icon\"><svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><circle cx=\"12\" cy=\"8\" r=\"4\" stroke=\"currentColor\" str ue.replace(/[^0-9]/g,'').slice(0,10), phoneError: '' });\n  onCityChange = (e) => this.setState({ city: e.target.value });\n  onSubmit = () => {\n    const { name, phone } = this.state;\n    let nameError = '', phoneError = '';\n    if (!name.trim()) nameError = 'Please enter your name';\n    if (phone.length !== 10) phoneError = 'Enter a valid 10-digit number';\n    if (nameError || phoneError) { this.setState({ nameError, phoneError }); return; }\n    this.setState({ submitted: true });\n  };\n  renderVals() {\n    const brandColor = this.props.brandColor ?? '#1B2E4E';\n    const startingPrice = this.props.startingPrice ?? 90000;\n    const showComparison = this.props.showComparison ?? true;\n    const themeMap = { '#1B2E4E': 'theme-navy', '#8B2942': 'theme-wine', '#B6203D': 'theme-crimson', '#A13D63': 'theme-mauve', '#7A4B8A': 'theme-plum' };\n    const themeClass = themeMap[brandColor] ?? 'theme-navy';\n    const fmt = (n) => '₹' + n.toLocaleString('en-IN');\n    return {\n      themeClass,\n      startingPriceDisplay: fmt(startingPrice),\n      showComparison,\n      menuOpen: this.state.menuOpen,\n      overviewTabClass: this.state.activeTab === 'overview' ? 'active' : '',\n      costTabClass: this.state.activeTab === 'cost' ? 'active' : '',\n      name: this.state.name, phone: this.state.phone, city: this.state.city,\n      nameError: this.state.nameError, phoneError: this.state.phoneError,\n      submitted: this.state.submitted,\n      toggleMenu: this.toggleMenu, showOverview: this.showOverview, showCost: this.showCost,\n      onNameChange: this.onNameChange, onPhoneChange: this.onPhoneChange, onCityChange: this.onCityChange, onSubmit: this.onSubmit\n    };\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"</script>
